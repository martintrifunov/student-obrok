services:
  nginx:
    container_name: obrok_nginx
    build:
      context: ./apps/client
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    volumes:
      - ./apps/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    environment:
      NODE_ENV: production
    ports:
      - 80:80
      - 443:443
    depends_on:
      - api
      - osrm
    networks:
      - obrok_prod_net
    command: "/bin/sh -c 'while :; do sleep 12h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    container_name: obrok_certbot
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - obrok_prod_net

  osrm:
    container_name: obrok_osrm
    image: osrm/osrm-backend
    volumes:
      - ./data/map:/data
    command: osrm-routed --algorithm mld --port 5001 /data/macedonia-latest.osrm
    networks:
      - obrok_prod_net

  api:
    container_name: obrok_api
    build:
      context: ./apps/server
      dockerfile: Dockerfile.prod
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - obrok_prod_net

  db:
    container_name: obrok_db
    image: mongo:8.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: obrok
    ports:
      - "127.0.0.1:6969:27017"
    volumes:
      - student_obrok_db:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - obrok_prod_net

networks:
  obrok_prod_net:
    driver: bridge

volumes:
  student_obrok_db: