name: Deploy to VPS

on:
  release:
    types: [published]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install server dependencies
        working-directory: ./apps/server
        run: npm ci

      - name: Run server tests
        working-directory: ./apps/server
        run: npm test

  deploy:
    name: Deploy to Production
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE }}
          envs: RELEASE_TAG
          script: |
            # Navigate to the exact absolute path on the VPS
            cd /home/maco/projects/student-obrok
            
            echo "--- Fetching latest code for $RELEASE_TAG ---"
            git fetch --tags
            git checkout $RELEASE_TAG
            
            echo "--- Injecting Dynamic Version into Frontend ---"
            # Ensure the client .env exists and add the version tag to it
            touch apps/client/.env
            sed -i '/VITE_RELEASE_VERSION/d' apps/client/.env
            echo "VITE_RELEASE_VERSION=$RELEASE_TAG" >> apps/client/.env
            
            echo "--- Building Documentation ---"
            cd apps/docs
            npm ci
            npm run docs:build
            cd ../..
            
            echo "--- Rebuilding Docker Containers ---"
            docker compose -f docker-compose.prod.yml up --build -d
            
            echo "--- Cleaning up old dangling images ---"
            docker image prune -f