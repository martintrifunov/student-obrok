name: Sync to FINKI GitLab (Disabled)

# Automatic triggers are commented out to prevent failures from invalid credentials.

on:
  workflow_dispatch: 
  # push:
  #   branches:
  #     - "main"
  # pull_request:
  #   branches:
  #     - "main"

jobs:
  gitlab-sync:
    name: gitlab-sync
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
    
      - name: Push to GitLab
        env:
          GITLAB_REMOTE_URL: ${{ secrets.GITLAB_REMOTE_URL }}
          GITLAB_MAIL: ${{ secrets.GITLAB_MAIL }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git config --global user.email "${GITLAB_MAIL}"
          git config --global user.name "${GITLAB_USERNAME}"
          
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@gitlab.finki.ukim.mk/193254/obrok.git

          git push gitlab main:main --force