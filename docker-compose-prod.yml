services:
  nginx:
    container_name: obrok_nginx
    build:
      context: ./apps/client
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    volumes:
      - ./apps/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    environment:
      NODE_ENV: production
    ports:
      - 80:80
      - 443:443

  certbot:
    container_name: obrok_certbot
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    command: >
      certonly --webroot -w /var/www/certbot
      --keep-until-expiring
      --email ${CERTBOT_EMAIL}
      -d obrok.net
      --agree-tos

  osrm:
    container_name: obrok_osrm
    image: osrm/osrm-backend
    volumes:
      - ./data/map:/data
    command: osrm-routed --algorithm mld --port 5001 /data/macedonia-latest.osrm
    ports:
      - 5001:5001

  api:
    container_name: obrok_api
    build:
      context: ./apps/server
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      NODE_ENV: production
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      DATABASE_URI: ${DATABASE_URI}
      PORT: ${PORT}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      SERVER_ORIGIN: ${SERVER_ORIGIN}
    ports:
      - 5000:5000
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: obrok_db
    image: mongo:8.0
    ports:
      - 6969:27017
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: obrok
    volumes:
      - student_obrok_db:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  student_obrok_db: