services:
  osrm:
    container_name: obrok_osrm
    image: osrm/osrm-backend
    volumes:
      - ./data/map:/data
    command: osrm-routed --algorithm mld --port 5001 /data/macedonia-latest.osrm
    ports:
      - 5001:5001

  client:
    container_name: obrok_client
    stdin_open: true
    tty: true
    build:
      dockerfile: Dockerfile.dev
      context: ./apps/client
    volumes:
      - /app/node_modules
      - ./apps/client:/app
    environment:
      NODE_ENV: development
    ports:
      - 3500:3500
    depends_on:
      - api

  api:
    container_name: obrok_api
    build:
      dockerfile: Dockerfile.dev
      context: ./apps/server
    volumes:
      - /app/node_modules
      - ./apps/server:/app
    environment:
      NODE_ENV: development
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      DATABASE_URI: ${DATABASE_URI}
      PORT: ${PORT}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      SERVER_ORIGIN: ${SERVER_ORIGIN}
    restart: always
    ports:
      - 5000:5000
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: obrok_db
    image: mongo:8.0
    ports:
      - 6969:27017
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: obrok
    volumes:
      - student_obrok_db:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  student_obrok_db: